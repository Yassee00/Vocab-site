<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日单词 - 初三英语</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .stat {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-num {
            font-size: 24px;
            font-weight: bold;
        }
        .stat-label {
            font-size: 12px;
            opacity: 0.8;
        }

        /* Daily Word Card */
        .daily-card {
            background: linear-gradient(145deg, #ffffff, #f5f5f5);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            color: #2c3e50;
        }
        .daily-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .daily-title h2 {
            font-size: 24px;
            color: #667eea;
        }
        .date-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 14px;
        }
        .word-display {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
            margin-bottom: 20px;
        }
        .word-text {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }
        .phonetic-text {
            font-size: 24px;
            opacity: 0.9;
            font-family: 'Lucida Sans Unicode', sans-serif;
        }
        .word-info {
            display: grid;
            gap: 15px;
        }
        .info-item {
            background: rgba(102, 126, 234, 0.1);
            padding: 15px;
            border-radius: 10px;
        }
        .info-label {
            font-size: 12px;
            color: #7f8c8d;
            margin-bottom: 5px;
            font-weight: 600;
        }
        .info-content {
            font-size: 16px;
            color: #2c3e50;
        }
        .meaning {
            font-size: 20px;
            font-weight: 500;
            color: #e74c3c;
        }
        .example {
            background: rgba(39, 174, 96, 0.1);
            border-left: 3px solid #27ae60;
            padding: 10px 15px;
        }
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        .action-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        .btn-mark {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }
        .btn-next {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .action-btn:active {
            transform: translateY(0);
        }

        /* Word List Section */
        .section-title {
            font-size: 24px;
            margin-bottom: 20px;
            padding-left: 15px;
            border-left: 4px solid #667eea;
        }
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #667eea;
        }
        .search-input {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: white;
            width: 200px;
        }
        .search-input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        /* Word Grid */
        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }
        .word-item {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .word-item:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-3px);
        }
        .word-item .word {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .word-item .freq-badge {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 8px;
            display: inline-block;
        }
        .freq-core { background: #27ae60; }
        .freq-expand { background: #f39c12; }
        .freq-general { background: #3498db; }
        .word-item.learned {
            opacity: 0.6;
        }
        .word-item.learned .learned-mark {
            display: block;
            position: absolute;
            top: 5px;
            right: 10px;
            color: #27ae60;
            font-size: 16px;
        }
        .word-item .learned-mark {
            display: none;
        }

        /* Modal for word details */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: linear-gradient(145deg, #2c3e50, #34495e);
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            color: white;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .modal-title {
            font-size: 32px;
            font-weight: bold;
        }
        .modal-close {
            font-size: 28px;
            cursor: pointer;
            opacity: 0.7;
            line-height: 1;
        }
        .modal-close:hover {
            opacity: 1;
        }
        .modal-phonetic {
            font-size: 20px;
            color: #bdc3c7;
            margin-bottom: 20px;
            font-family: 'Lucida Sans Unicode', sans-serif;
        }
        .modal-section {
            margin-bottom: 15px;
        }
        .modal-label {
            font-size: 12px;
            color: #95a5a6;
            margin-bottom: 5px;
        }
        .modal-value {
            font-size: 16px;
            line-height: 1.5;
        }
        .modal-meaning {
            font-size: 18px;
            color: #f1c40f;
        }
        .modal-example {
            background: rgba(39, 174, 96, 0.2);
            padding: 10px 15px;
            border-radius: 8px;
            border-left: 3px solid #27ae60;
        }
        .modal-badge {
            background: rgba(230, 126, 34, 0.3);
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid rgba(230, 126, 34, 0.5);
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #27ae60;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 2000;
        }
        .toast.show {
            opacity: 1;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            margin-top: 30px;
            opacity: 0.6;
        }

        /* Mobile */
        @media (max-width: 600px) {
            .header h1 { font-size: 24px; }
            .word-text { font-size: 36px; }
            .phonetic-text { font-size: 18px; }
            .word-grid { grid-template-columns: repeat(2, 1fr); }
            .filter-bar { flex-direction: column; }
            .search-input { width: 100%; }
            .action-buttons { flex-direction: column; }
            .action-btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📚 初三每日单词</h1>
            <p>每天背几个，中考更轻松</p>
            <div class="stats-bar">
                <div class="stat">
                    <div class="stat-num" id="totalWords">220</div>
                    <div class="stat-label">总词数</div>
                </div>
                <div class="stat">
                    <div class="stat-num" id="learnedCount">0</div>
                    <div class="stat-label">已学习</div>
                </div>
                <div class="stat">
                    <div class="stat-num" id="remainingCount">220</div>
                    <div class="stat-label">剩余</div>
                </div>
            </div>
        </div>

        <!-- Daily Word Card -->
        <div class="daily-card">
            <div class="daily-title">
                <h2>📌 今日推荐单词</h2>
                <div class="date-badge" id="todayDate"></div>
            </div>
            <div class="word-display">
                <div class="word-text" id="dailyWord">加载中...</div>
                <div class="phonetic-text" id="dailyPhonetic"></div>
            </div>
            <div class="word-info">
                <div class="info-item">
                    <div class="info-label">📖 释义</div>
                    <div class="info-content meaning" id="dailyMeaning"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">📝 例句</div>
                    <div class="info-content example" id="dailyExample"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">🔗 搭配</div>
                    <div class="info-content" id="dailyCollocation"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">🎯 考点</div>
                    <div class="info-content" id="dailyExamPoint"></div>
                </div>
            </div>
            <div class="action-buttons">
                <button class="action-btn btn-mark" id="btnMark">✓ 标记已学习</button>
                <button class="action-btn btn-next" id="btnNext">→ 下一个单词</button>
            </div>
        </div>

        <!-- Word List -->
        <div class="section-title">📚 全部单词</div>
        <div class="filter-bar">
            <button class="filter-btn active" id="filterAll">全部</button>
            <button class="filter-btn" id="filterCore">中考核心</button>
            <button class="filter-btn" id="filterExpand">中考拓展</button>
            <button class="filter-btn" id="filterGeneral">中考一般</button>
            <input type="text" class="search-input" placeholder="搜索单词..." id="searchInput">
        </div>
        <div class="word-grid" id="wordGrid">加载中...</div>

        <!-- Footer -->
        <div class="footer">
            <p>初三英语词汇学习工具 | 点击单词查看详情</p>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="wordModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalWord"></div>
                <div class="modal-close" id="modalClose">×</div>
            </div>
            <div class="modal-phonetic" id="modalPhonetic"></div>
            <div class="modal-section">
                <div class="modal-label">📖 释义</div>
                <div class="modal-value modal-meaning" id="modalMeaning"></div>
            </div>
            <div class="modal-section">
                <div class="modal-label">📝 例句</div>
                <div class="modal-value modal-example" id="modalExample"></div>
            </div>
            <div class="modal-section">
                <div class="modal-label">🔗 搭配</div>
                <div class="modal-value" id="modalCollocation"></div>
            </div>
            <div class="modal-section">
                <div class="modal-label">🔄 派生词</div>
                <div class="modal-value" id="modalDerivative"></div>
            </div>
            <div class="modal-section">
                <div class="modal-label">💡 同义词</div>
                <div class="modal-value" id="modalSynonym"></div>
            </div>
            <div class="modal-section">
                <div class="modal-label">🎯 考点</div>
                <div class="modal-value modal-badge" id="modalExamPoint"></div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">已标记为学习完成！</div>

    <!-- Load words data -->
    <script src="words.js"></script>

    <script>
        // Global variables - initialize first
        let currentDailyIndex = 0;
        let learnedWords = [];

        // Safe load from localStorage
        try {
            const saved = localStorage.getItem('learnedWords');
            if (saved) {
                learnedWords = JSON.parse(saved);
            }
        } catch (e) {
            learnedWords = [];
        }

        // Show toast notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // Set today's date
        function setDate() {
            const today = new Date();
            const dateStr = today.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            document.getElementById('todayDate').textContent = dateStr;
        }

        // Calculate daily word index based on date
        function getDailyIndex() {
            const today = new Date();
            const start = new Date(2024, 0, 1);
            const diffDays = Math.floor((today - start) / (1000 * 60 * 60 * 24));
            const totalWords = wordsData ? wordsData.length : 220;
            return diffDays % totalWords;
        }

        // Display daily word
        function showDailyWord() {
            if (!wordsData || wordsData.length === 0) {
                console.error('wordsData not loaded');
                return;
            }

            currentDailyIndex = getDailyIndex();
            const word = wordsData[currentDailyIndex];

            document.getElementById('dailyWord').textContent = word.word || '';
            document.getElementById('dailyPhonetic').textContent = word.phonetic || '';
            document.getElementById('dailyMeaning').textContent = word.meaning || '';
            document.getElementById('dailyExample').textContent = word.example || '';
            document.getElementById('dailyCollocation').textContent = word.collocation || '';
            document.getElementById('dailyExamPoint').textContent = word.examPoint || '';
        }

        // Mark as learned
        function markLearned() {
            if (!wordsData) return;

            const word = wordsData[currentDailyIndex].word;
            if (!learnedWords.includes(word)) {
                learnedWords.push(word);
                try {
                    localStorage.setItem('learnedWords', JSON.stringify(learnedWords));
                } catch (e) {
                    console.warn('localStorage not available');
                }
                updateStats();
                updateWordGrid();
                showToast('已标记为学习完成 ✓');
            } else {
                showToast('这个单词已经学过了');
            }
            nextWord();
        }

        // Next word
        function nextWord() {
            if (!wordsData) return;

            currentDailyIndex = (currentDailyIndex + 1) % wordsData.length;
            showDailyWord();
        }

        // Update stats
        function updateStats() {
            const total = wordsData ? wordsData.length : 220;
            const learned = learnedWords.length;
            document.getElementById('totalWords').textContent = total;
            document.getElementById('learnedCount').textContent = learned;
            document.getElementById('remainingCount').textContent = total - learned;
        }

        // Generate word grid
        function updateWordGrid() {
            if (!wordsData) return;

            const grid = document.getElementById('wordGrid');
            grid.innerHTML = '';

            wordsData.forEach((word, index) => {
                const freqClass = (word.freq && word.freq.includes('核心')) ? 'freq-core' :
                                 (word.freq && word.freq.includes('拓展')) ? 'freq-expand' : 'freq-general';
                const isLearned = learnedWords.includes(word.word);

                const item = document.createElement('div');
                item.className = 'word-item' + (isLearned ? ' learned' : '');
                item.dataset.index = index;
                item.dataset.freq = word.freq || '';
                item.dataset.word = (word.word || '').toLowerCase();

                item.innerHTML = `
                    <div class="word">${word.word || ''}</div>
                    <div class="freq-badge ${freqClass}">${word.freq || ''}</div>
                    <div class="learned-mark">✓</div>
                `;

                item.addEventListener('click', function() {
                    showWordDetail(index);
                });

                grid.appendChild(item);
            });
        }

        // Filter words by frequency
        function filterWords(freq) {
            // Update button states
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            if (freq === 'all') {
                document.getElementById('filterAll').classList.add('active');
            } else if (freq === '中考核心') {
                document.getElementById('filterCore').classList.add('active');
            } else if (freq === '中考拓展') {
                document.getElementById('filterExpand').classList.add('active');
            } else if (freq === '中考一般') {
                document.getElementById('filterGeneral').classList.add('active');
            }

            // Filter items
            const items = document.querySelectorAll('.word-item');
            items.forEach(item => {
                const itemFreq = item.dataset.freq;
                if (freq === 'all' || itemFreq === freq) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        // Search words
        function searchWords(query) {
            query = query.toLowerCase().trim();
            const items = document.querySelectorAll('.word-item');

            items.forEach(item => {
                const wordText = item.dataset.word;
                if (query === '' || wordText.includes(query)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        // Show word detail modal
        function showWordDetail(index) {
            if (!wordsData) return;

            const word = wordsData[index];
            document.getElementById('modalWord').textContent = word.word || '';
            document.getElementById('modalPhonetic').textContent = word.phonetic || '';
            document.getElementById('modalMeaning').textContent = word.meaning || '';
            document.getElementById('modalExample').textContent = word.example || '';
            document.getElementById('modalCollocation').textContent = word.collocation || '';
            document.getElementById('modalDerivative').textContent = word.derivative || '';
            document.getElementById('modalSynonym').textContent = word.synonym || '';
            document.getElementById('modalExamPoint').textContent = word.examPoint || '';
            document.getElementById('wordModal').classList.add('active');
        }

        // Close modal
        function closeModal() {
            document.getElementById('wordModal').classList.remove('active');
        }

        // Initialize everything when DOM is ready
        function init() {
            setDate();
            showDailyWord();
            updateStats();
            updateWordGrid();

            // Bind button events
            document.getElementById('btnMark').addEventListener('click', markLearned);
            document.getElementById('btnNext').addEventListener('click', nextWord);
            document.getElementById('modalClose').addEventListener('click', closeModal);

            // Bind filter buttons
            document.getElementById('filterAll').addEventListener('click', function() { filterWords('all'); });
            document.getElementById('filterCore').addEventListener('click', function() { filterWords('中考核心'); });
            document.getElementById('filterExpand').addEventListener('click', function() { filterWords('中考拓展'); });
            document.getElementById('filterGeneral').addEventListener('click', function() { filterWords('中考一般'); });

            // Bind search input
            document.getElementById('searchInput').addEventListener('input', function() {
                searchWords(this.value);
            });

            // Close modal on outside click
            document.getElementById('wordModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeModal();
                }
            });
        }

        // Wait for DOM and words.js to load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            // DOM already loaded
            setTimeout(init, 100);
        }
    </script>
</body>
</html>

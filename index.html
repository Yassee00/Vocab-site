<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词学习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 30px;
        }
        .header h1 {
            font-size: 42px;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .header p {
            font-size: 18px;
            opacity: 0.9;
        }

        .stats-overview {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-radius: 15px;
            text-align: center;
            color: white;
        }
        .stat-card .num {
            font-size: 36px;
            font-weight: bold;
        }
        .stat-card .label {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 5px;
        }

        .section-title {
            color: white;
            font-size: 24px;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 4px solid rgba(255,255,255,0.5);
        }

        .units-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .unit-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .unit-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .unit-card .grade {
            font-size: 14px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .unit-card .name {
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .unit-card .count {
            font-size: 14px;
            color: #7f8c8d;
        }
        .unit-card .progress-bar {
            height: 6px;
            background: #ecf0f1;
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
        }
        .unit-card .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            transition: width 0.5s ease;
        }
        .unit-card .progress-text {
            font-size: 12px;
            color: #27ae60;
            margin-top: 8px;
        }

        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            padding: 30px;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 32px; }
            .units-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 英语单词学习</h1>
            <p>选择单元开始学习，每天进步一点点</p>
        </div>

        <div class="stats-overview">
            <div class="stat-card">
                <div class="num" id="totalWords">2176</div>
                <div class="label">总词汇量</div>
            </div>
            <div class="stat-card">
                <div class="num" id="learnedWords">0</div>
                <div class="label">已学习</div>
            </div>
            <div class="stat-card">
                <div class="num">5</div>
                <div class="label">学习单元</div>
            </div>
        </div>

        <h2 class="section-title">选择学习单元</h2>
        <div class="units-grid" id="unitsGrid">
            <a class="unit-card" href="unit.html?unit=初一">
                <div class="grade">初一</div>
                <div class="name">初一词汇</div>
                <div class="count">共 621 个单词/短语</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress_初一" style="width: 0%"></div>
                </div>
                <div class="progress-text" id="progressText_初一">点击开始学习</div>
            </a>
            <a class="unit-card" href="unit.html?unit=初二">
                <div class="grade">初二</div>
                <div class="name">初二词汇</div>
                <div class="count">共 506 个单词/短语</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress_初二" style="width: 0%"></div>
                </div>
                <div class="progress-text" id="progressText_初二">点击开始学习</div>
            </a>
            <a class="unit-card" href="unit.html?unit=初三">
                <div class="grade">初三</div>
                <div class="name">初三词汇</div>
                <div class="count">共 220 个单词/短语</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress_初三" style="width: 0%"></div>
                </div>
                <div class="progress-text" id="progressText_初三">点击开始学习</div>
            </a>
            <a class="unit-card" href="unit.html?unit=高中必修">
                <div class="grade">高中</div>
                <div class="name">高中必修</div>
                <div class="count">共 670 个单词/短语</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress_高中必修" style="width: 0%"></div>
                </div>
                <div class="progress-text" id="progressText_高中必修">点击开始学习</div>
            </a>
            <a class="unit-card" href="unit.html?unit=高中选修">
                <div class="grade">高中</div>
                <div class="name">高中选修</div>
                <div class="count">共 159 个单词/短语</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress_高中选修" style="width: 0%"></div>
                </div>
                <div class="progress-text" id="progressText_高中选修">点击开始学习</div>
            </a>
        </div>

        <div class="footer">
            <p>💡 提示：学习进度会自动保存在浏览器中</p>
        </div>
    </div>

    <script>
        // 更新学习进度统计
        function updateStats() {
            let totalLearned = 0;
            const units = ["初一", "初二", "初三", "高中必修", "高中选修"];

            units.forEach(unit => {
                const learned = JSON.parse(localStorage.getItem('learned_' + unit) || '[]');
                const count = learned.length;
                totalLearned += count;

                const unitData = {"初一": 621, "初二": 506, "初三": 220, "高中必修": 670, "高中选修": 159};
                const total = unitData[unit];
                const percent = (count / total * 100).toFixed(1);

                const progressFill = document.getElementById('progress_' + unit);
                const progressText = document.getElementById('progressText_' + unit);

                if (progressFill) progressFill.style.width = percent + '%';
                if (progressText) {
                    if (count > 0) {
                        progressText.textContent = '已学习 ' + count + '/' + total + ' (' + percent + '%)';
                    }
                }
            });

            document.getElementById('learnedWords').textContent = totalLearned;
        }

        updateStats();
    </script>
</body>
</html>

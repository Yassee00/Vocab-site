<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词学习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }

        .nav-bar {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .back-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        .unit-title {
            color: white;
            font-size: 20px;
            margin-left: 20px;
        }

        .progress-section {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .progress-bar {
            height: 20px;
            background: #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            transition: width 0.5s ease;
        }
        .progress-text {
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
        }

        .daily-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .word-section {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid #f0f0f0;
            margin-bottom: 20px;
        }
        .word {
            font-size: 48px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .phonetic {
            font-size: 24px;
            color: #7f8c8d;
            font-family: 'Lucida Sans Unicode', sans-serif;
        }
        .freq-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 15px;
        }
        .freq-expand { background: linear-gradient(135deg, #f39c12, #e74c3c); color: white; }
        .freq-core { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; }
        .freq-general { background: linear-gradient(135deg, #3498db, #2980b9); color: white; }

        .info-section { margin-bottom: 20px; }
        .info-label {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 8px;
            font-weight: 600;
            display: flex;
            align-items: center;
        }
        .info-label::before {
            content: '';
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
        }
        .label-meaning::before { background: #e74c3c; }
        .label-example::before { background: #27ae60; }
        .label-collocation::before { background: #f39c12; }
        .label-derivative::before { background: #9b59b6; }
        .label-synonym::before { background: #3498db; }
        .label-exam::before { background: #e67e22; }
        .info-content {
            font-size: 16px;
            color: #2c3e50;
            line-height: 1.8;
            padding-left: 22px;
        }
        .meaning-text { font-size: 20px; font-weight: 600; color: #e74c3c; }
        .example-text {
            background: linear-gradient(135deg, #e8f6ef, #d5f4e6);
            padding: 15px 20px;
            border-radius: 10px;
            border-left: 4px solid #27ae60;
        }
        .collocation-item, .synonym-item {
            display: inline-block;
            background: #f8f9fa;
            padding: 8px 15px;
            border-radius: 8px;
            margin: 5px;
            font-size: 14px;
            border: 1px solid #e9ecef;
        }
        .exam-box {
            background: linear-gradient(135deg, #fff3e0, #ffe0b2);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid #ffcc80;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .btn-learned { background: #27ae60 !important; }

        .word-list {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        .word-list h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .filter-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: #f0f0f0;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .search-input {
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            width: 200px;
            font-size: 14px;
        }
        .search-input:focus { outline: none; border-color: #667eea; }

        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
        }
        .word-item {
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        .word-item:hover { background: #667eea; color: white; }
        .word-item.learned { background: #27ae60; color: white; }

        @media (max-width: 600px) {
            .word { font-size: 36px; }
            .buttons { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <a href="index.html" class="back-btn">← 返回首页</a>
            <div class="unit-title" id="unitTitle">加载中...</div>
        </div>

        <div class="progress-section">
            <div class="progress-text">
                已学习 <span id="learnedCount">0</span> / <span id="totalCount">0</span> 个单词
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>

        <div class="daily-card" id="dailyCard">
            <div class="word-section">
                <div class="word" id="currentWord">加载中...</div>
                <div class="phonetic" id="currentPhonetic"></div>
                <div class="freq-badge" id="currentFreq">中考拓展</div>
            </div>
            <div class="info-section">
                <div class="info-label label-meaning">释义</div>
                <div class="info-content meaning-text" id="currentMeaning"></div>
            </div>
            <div class="info-section" id="exampleSection">
                <div class="info-label label-example">例句</div>
                <div class="info-content example-text" id="currentExample"></div>
            </div>
            <div class="info-section" id="collocationSection">
                <div class="info-label label-collocation">固定搭配</div>
                <div class="info-content" id="currentCollocation"></div>
            </div>
            <div class="info-section" id="derivativeSection">
                <div class="info-label label-derivative">派生词</div>
                <div class="info-content" id="currentDerivative"></div>
            </div>
            <div class="info-section" id="synonymSection">
                <div class="info-label label-synonym">同义词</div>
                <div class="info-content" id="currentSynonym"></div>
            </div>
            <div class="info-section" id="examSection">
                <div class="info-label label-exam">考点</div>
                <div class="info-content exam-box" id="currentExam"></div>
            </div>
            <div class="buttons">
                <button class="btn btn-primary" id="learnBtn">标记已学习</button>
                <button class="btn btn-secondary" id="nextBtn">下一个单词</button>
            </div>
        </div>

        <div class="word-list">
            <h3>📖 单词列表</h3>
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="learned">已学习</button>
                <button class="filter-btn" data-filter="unlearned">未学习</button>
                <input type="text" class="search-input" id="searchInput" placeholder="搜索单词...">
            </div>
            <div class="word-grid" id="wordGrid"></div>
        </div>
    </div>

    <script>
        const allUnitsData = {"初一": {"displayName": "初一", "words": [{"word": 1, "phonetic": "guitar", "meaning": "/ɡɪˈtɑː(r)/", "newMeaning": "c.n. 吉他", "example": "", "collocation": "She plays the guitar very well. 她吉他弹得很好。", "derivative": "play the guitar 弹吉他; acoustic guitar 原声吉他; electric guitar 电吉他", "synonym": "guitarist n. 吉他手", "examPoint": "guitar指吉他; violin指小提琴; piano指钢琴", "freq": "中考一般"}, {"word": 2, "phonetic": "honest", "meaning": "/ˈɒnɪst/", "newMeaning": "adj. 诚实的", "example": "", "collocation": "He is an honest boy. 他是个诚实的男孩。", "derivative": "be honest with 对...诚实; honest opinion 诚实的意见; to be honest 老实说", "synonym": "honesty n. 诚实; honestly adv. 诚实地; dishonest adj. 不诚实的", "examPoint": "honest指诚实的; sincere指真诚的; truthful指真实的", "freq": "中考拓展"}, {"word": 3, "phonetic": "patient", "meaning": "/ˈpeɪʃnt/", "newMeaning": "adj. 有耐心的 c.n. 病人", "example": "", "collocation": "Be patient with your students. 对你的学生要有耐心。", "derivative": "be patient with 对...有耐心; patient care 病人护理; patient of 能忍受...的", "synonym": "patience n. 耐心; patiently adv. 耐心地; impatient adj. 不耐烦的", "examPoint": "patient指有耐心的/病人; tolerant指宽容的", "freq": "中考拓展"}, {"word": 4, "phonetic": "improve", "meaning": "/ɪmˈpruːv/", "newMeaning": "v.t./v.i. 改善", "example": "", "collocation": "You need to improve your English. 你需要提高你的英语。", "derivative": "improve on/upon 改进; improve oneself 提高自己; improve skills 提高技能", "synonym": "improvement n. 改进; improving adj. 改进中的", "examPoint": "improve指改善/提高; better指改善; enhance指增强", "freq": "中考拓展"}, {"word": 5, "phonetic": "confident", "meaning": "/ˈkɒnfɪdənt/", "newMeaning": "adj. 自信的", "example": "", "collocation": "She feels confident about the exam. 她对考试很有信心。", "derivative": "be confident of 对...有信心; confident smile 自信的微笑; feel confident 感到自信", "synonym": "confidence n. 信心; confidently adv. 自信地", "examPoint": "confident指自信的; certain指确定的; sure指确信的", "freq": "中考拓展"}, {"word": 6, "phonetic": "courage", "meaning": "/ˈkʌrɪdʒ/", "newMeaning": "u.n. 勇气；胆量", "example": "", "collocation": "It takes courage to speak in public. 在公众面前讲话需要勇气。", "derivative": "have the courage to do 有勇气做; lose courage 丧失勇气; take courage 鼓起勇气", "synonym": "courageous adj. 勇敢的; encourage v. 鼓励; discourage v. 使泄气", "examPoint": "courage指勇气; bravery指勇敢; fearlessness指无畏", "freq": "中考拓展"}, {"word": 7, "phonetic": "friendship", "meaning": "/ˈfrendʃɪp/", "newMeaning": "u.n. 友谊", "example": "", "collocation": "Their friendship has lasted for years. 他们的友谊持续了很多年。", "derivative": "develop a friendship 发展友谊; true friendship 真正的友谊; friendship between ...之间的友谊", "synonym": "friend n. 朋友; friendly adj. 友好的; befriend v. 和...交朋友", "examPoint": "friendship指友谊; companionship指陪伴; relationship指关系", "freq": "中考核心"}, {"word": 8, "phonetic": "trust", "meaning": "/trʌst/", "newMeaning": "u.n./c.n. 信任 v.t./v.i. 相信", "example": "", "collocation": "I trust you completely. 我完全信任你。", "derivative": "trust in 信任; trust sb. with sth. 把某事托付给某人; put trust in 相信", "synonym": "trustful adj. 轻信的; trustworthy adj. 值得信任的; trustworthiness n. 可信度", "examPoint": "trust指信任; believe指相信; rely on指依赖", "freq": "中考拓展"}, {"word": 9, "phonetic": "survey", "meaning": "/ˈsɜːveɪ/", "newMeaning": "c.n. 调查；测量 v.t./v.i. 调查", "example": "", "collocation": "We conducted a survey on students' habits. 我们对学生的习惯进行了调查。", "derivative": "conduct a survey 进行调查; survey result 调查结果; survey on 关于...的调查", "synonym": "surveyor n. 测量员; surveying n. 测量", "examPoint": "survey指调查; investigation指调查; research指研究", "freq": "中考拓展"}, {"word": 10, "phonetic": "personal", "meaning": "/ˈpɜːsənl/", "newMeaning": "adj. 个人的；私人的", "example": "", "collocation": "This is my personal opinion. 这是我个人的观点。", "derivative": "personal information 个人信息; personal opinion 个人观点; personal life 私生活", "synonym": "person n. 人; personality n. 个性; personally adv. 个人地", "examPoint": "personal指个人的; private指私人的; individual指个体的", "freq": "中考拓展"}, {"word": 11, "phonetic": "quality", "meaning": "/ˈkwɒləti/", "newMeaning": "u.n./c.n. 质量", "example": "", "collocation": "Th tʊə(r)/", "meaning": "c.n. 旅游；旅行 v.t./v.i. 旅游；观光", "newMeaning": "", "example": "We went on a tour of the city. 我们游览了这座城市。\nThe band is touring Europe. 乐队正在欧洲巡回演出。", "collocation": "go on a tour 去旅游；a tour guide 导游；go on a tour of 参观……", "derivative": "tourism n. 旅游业；tourist n. 游客", "synonym": "tour 侧重参观游览；travel 泛指旅行；trip 短途旅行", "examPoint": "go on a tour of + 地点 参观某地；tourist attraction 旅游景点", "freq": "中考拓展"}, {"word": "tai chi", "phonetic": "/ˌtaɪ ˈtʃiː/", "meaning": "u.n. 太极拳", "newMeaning": "", "example": "Many old people practice tai chi in the park. 很多老人在公园练太极拳。\nTai chi is good for your health. 太极拳对健康有益。", "collocation": "practice tai chi 练太极拳；do tai chi 打太极拳", "derivative": "", "synonym": "martial arts 武术；kung fu 功夫", "examPoint": "专有名词，书写时两个词分开", "freq": "中考一般"}, {"word": "yet", "phonetic": "/jet/", "meaning": "adv. 还，尚未（用于否定句）；已经（用于疑问句）；仍然\nconj. 但是，然而", "newMeaning": "conj. 但是，然而", "example": "I haven't finished my homework yet. 我还没完成作业。\nHas he arrived yet? 他已经到了吗？\nThe work is hard, yet I enjoy it. 工作很辛苦，但我很喜欢。", "collocation": "not ... yet 还没有……；as yet 迄今为止（常用于否定）", "derivative": "", "synonym": "yet 用于否定句和疑问句；already 用于肯定句，表示已经", "examPoint": "yet 用于完成时的否定句和疑问句，置于句末；already 用于肯定句", "freq": "中考拓展"}, {"word": "independent", "phonetic": "/ˌɪndɪˈpendənt/", "meaning": "adj. 独立的", "newMeaning": "", "example": "She is an independent woman. 她是一个独立的女性。\nChildren should learn to be independent. 孩子应该学会独立。", "collocation": "be independent of 独立于……之外；不依赖……；independent study 自主学习", "derivative": "independently adv. 独立地；independence n. 独立；depend v. 依赖", "synonym": "independent 指自主、不依赖；autonomous 指自治的", "examPoint": "be independent of 不依赖；independence 独立（名词）；派生词考点：independence n. 独立；depend v. 依赖；dependent adj. 依赖的", "freq": "中考拓展"}, {"word": "content", "phonetic": "//kənˈtent/ (adj.) /ˈkɒntent/ (n.)/", "meaning": "adj. 满足的；满意的\nn. 内容；目录；含量；满足", "newMeaning": "adj. 满足的；满意的（注意与名词发音不同）", "example": "I am content with my life. 我对我的生活感到满足。\nThe content of the book is interesting. 这本书的内容很有趣。", "collocation": "be content with 对……感到满足；be content to do sth. 意做某事；table of contents 目录", "derivative": "contented adj. 满足的；contentment n. 满足", "synonym": "content 指内心的满足；satisfied 指需求得到满足", "examPoint": "be content with 对……感到满足；区分 content (adj.) 和 content (n.) 的发音和用法；派生词考点：contented adj. 满足的；contentment n. 满足", "freq": "中考拓展"}, {"word": "feeling", "phonetic": "/ˈfiːlɪŋ/", "meaning": "c.n. 感觉；感情；心情", "newMeaning": "", "example": "I have a feeling that something good will happen. 我有种感觉，好事要发生了。\nShe didn't want to hurt his feelings. 她不想伤害他的感情。", "collocation": "have a feeling (that) 有种感觉……；hurt one's feelings 伤害某人的感情", "derivative": "feel v. 感觉；feelingless adj. 无感觉的", "synonym": "feeling 泛指感觉或感情；emotion 指强烈的情感", "examPoint": "have a feeling that... 有种感觉……；hurt one's feelings 伤害某人感情", "freq": "中考核心"}, {"word": "shock", "phonetic": "/ʃɒk/", "meaning": "u.n./c.n. 震惊 v.t. 使震惊", "newMeaning": "", "example": "The news came as a shock to everyone. 这个消息让所有人都很震惊。\nHe was shocked by what he saw. 他被所见之物震惊了。", "collocation": "be in shock 处于震惊中；get a shock 受到惊吓；be shocked at/by 对……感到震惊", "derivative": "shocked adj. 震惊的；shocking adj. 令人震惊的", "synonym": "shock 指突然而强烈的震惊；surprise 指意外、吃惊", "examPoint": "be shocked at/by sth. 对某事感到震惊；to one's shock 令某人震惊的是；派生词考点：区分 shocked（人感到震惊）和 shocking（事物令人震惊）", "freq": "中考拓展"}, {"word": "foreign", "phonetic": "/ˈfɒrən/", "meaning": "adj. 外国的；对外的；陌生的；不相容的", "newMeaning": "", "example": "She is learning a foreign language. 她在学习一门外语。\nThe concept was foreign to me. 这个概念对我来说很陌生。", "collocation": "foreign language 外语；foreign country 外国；foreigner n. 外国人", "derivative": "foreigner n. 外国人；foreignness n. 外国特性", "synonym": "foreign 指外国的；alien 指外星人的或外国的", "examPoint": "foreign language 外语；foreigner 外国人；派生词考点：foreigner n. 外国人", "freq": "中考核心"}, {"word": "confused", "phonetic": "/kənˈfjuːzd/", "meaning": "adj. 困惑的；混淆的；糊涂的", "newMeaning": "", "example": "I'm confused about the instructions. 我对这些说明感到困惑。\nShe looked confused. 她看起来很困惑。", "collocation": "be confused about 对……感到困惑；get confused 变得困惑", "derivative": "confuse v. 使困惑；confusing adj. 令人困惑的；confusion n. 困惑", "synonym": "confused 指内心困惑；puzzled 指不解；confusing 指事物令人困惑", "examPoint": "区分 confused（人感到困惑）和 confusing（事物令人困惑）；派生词考点：confuse v. 使困惑；confusing adj. 令人困惑的；confusion n. 困惑；区分 confused/ing", "freq": "中考一般"}, {"word": "anxious", "phonetic": "/ˈæŋkʃəs/", "meaning": "adj. 焦虑的", "newMeaning": "渴望的，急切的", "example": "She is anxious about the exam results. 她担心考试结果。\nHe was anxious to leave. 他急于离开。", "collocation": "be anxious about 为……担忧；be anxious to do sth. 急于做某事", "derivative": "anxiously adv. 焦虑地；anxiety n. 焦虑", "synonym": "anxious 侧重担忧和渴望；nervous 指紧张不安", "examPoint": "be anxious about 为……担忧；be anxious to do sth. 急于做某事；派生词考点：anxiety n. 焦虑", "freq": "中考拓展"}, {"word": "phase", "phonetic": "/feɪz/", "meaning": "c.n. 阶段；时期 v.t. 分阶段进行", "newMeaning": "", "example": "The project is in its final phase. 项目处于最后阶段。\nShe's going through a difficult phase. 她正经历一个困难时期。", "collocation": "go through a phase 经历一个阶段；phase in 逐步引入；phase out 逐步淘汰", "derivative": "", "synonym": "phase 指发展的阶段；stage 指阶段或舞台", "examPoint": "in a phase 在某个阶段；phase in/out 逐步引入/淘汰", "freq": "中考拓展"}, {"word": "honeymoon", "phonetic": "/ˈhʌnimuːn/", "meaning": "c.n. 蜜月；蜜月旅行", "newMeaning": "（和谐、热情的）初期，蜜月期", "example": "They went to Paris for their honeymoon. 他们去巴黎度蜜月。\nThe honeymoon period of the new job has ended. 新工作的蜜月期已经结束。", "collocation": "go on a honeymoon 去度蜜月；honeymoon period 蜜月期", "derivative": "", "synonym": "honeymoon 蜜月；vacation 度假", "examPoint": "honeymoon period 蜜月期（可用于比喻义）", "freq": "中考一般"}, {"word": "unfamiliar", "phonetic": "/ˌʌnfəˈmɪliə(r)/", "meaning": "adj. 不熟悉的", "newMeaning": "", "example": "The place was unfamiliar to me. 这个地方对我来说很陌生。\nI'm unfamiliar with this software. 我不熟悉这个软件。", "collocation": "be unfamiliar with 不熟悉……；be unfamiliar to 对……来说陌生", "derivative": "unfamiliarity n. 陌生；familiar adj. 熟悉的", "synonym": "unfamiliar 指不熟悉；strange 指陌生的、奇怪的", "examPoint": "be unfamiliar with sth. 某人不熟悉某物；be unfamiliar to sb. 某物对某人来说陌生", "freq": "中考一般"}, {"word": "homesick", "phonetic": "/ˈhəʊmsɪk/", "meaning": "adj. 想家的", "newMeaning": "", "example": "She felt homesick when she studied abroad. 她在国外留学时很想家。\nThe little boy was homesick for his mother. 小男孩想念他的母亲。", "collocation": "feel homesick 想家；be homesick for 思念……", "derivative": "homesickness n. 思乡病；home n. 家；-sick 后缀表示思念……的", "synonym": "homesick 特指想家；nostalgic 指怀旧的", "examPoint": "feel homesick 想家；-sick 后缀表示思念……的或因……而恶心的", "freq": "中考一般"}, {"word": "lonely", "phonetic": "/ˈləʊnli/", "meaning": "adj. 孤独的；寂寞的；偏僻的", "newMeaning": "", "example": "She felt lonely after her friends moved away. 朋友们搬走后她感到孤独。\nHe lives in a lonely mountain village. 他住在一个偏僻的山村。", "collocation": "feel lonely 感到孤独；lonely life 孤独的生活", "derivative": "loneliness n. 孤独；lone adj. 孤独的；alone adj./adv. 单独的", "synonym": "lonely 指情感上的孤独、寂寞；alone 指独自一人的状态", "examPoint": "区分 lonely（孤独寂寞的，有感情色彩）和 alone（独自的，无感情色彩）；派生词考点：loneliness n. 孤独；alone adj./adv. 单独的（无感情色彩）", "freq": "中考拓展"}, {"word": "deal", "phonetic": "/diːl/", "meaning": "v.t./v.i. 处理；应对；经营 n. 交易；协议；大量", "newMeaning": "n. 大量（a great/good deal of）", "example": "How do you deal with this problem? 你如何处理这个问题？\nThey made a deal. 他们达成了一项协议。\nHe spent a great deal of money. 他花了很多钱。", "collocation": "deal with 处理；应付；a great deal of 大量（修饰不可数名词）", "derivative": "dealer n. 商人；dealing n. 交易", "synonym": "deal with 处理（问题）；handle 处理；cope with 应对", "examPoint": "deal with 处理；a great/good deal of + 不可数名词", "freq": "中考核心"}, {"word": "expect", "phonetic": "/ɪkˈspekt/", "meaning": "v.t. 期待", "newMeaning": "怀孕（be expecting）", "example": "I expect to finish the work by Friday. 我预期周五前完成工作。\nShe is expecting a baby. 她怀孕了。", "collocation": "expect to do sth. 期待做某事；expect sb. to do sth. 期待某人做某事", "derivative": "expectation n. 期待；预期；unexpected adj. 意外的", "synonym": "expect 指预期、期待；hope 指希望", "examPoint": "expect sb. to do sth. 期待某人做某事；派生词考点：expectation n. 期待；unexpected adj. 意外的；unexpectedly adv. 意外地", "freq": "中考拓展"}, {"word": "situation", "phonetic": "/ˌsɪtʃuˈeɪʃn/", "meaning": "c.n. 情况", "newMeaning": "", "example": "The situation is getting worse. 形势正在恶化。\nI'm in a difficult situation. 我处境困难。", "collocation": "in a ... situation 处于……的情况；current situation 当前形势", "derivative": "situational adj. 情境的；situate v. 使位于", "synonym": "situation 指综合情况、形势；condition 指条件", "examPoint": "in a difficult situation 处于困境；the current situation 当前形势", "freq": "中考拓展"}, {"word": "accept", "phonetic": "/əkˈsept/", "meaning": "v.t./v.i. 接受", "newMeaning": "", "example": "She accepted my invitation. 她接受了我的邀请。\nI accept your apology. 我接受你的道歉。", "collocation": "accept an invitation 接受邀请；accept responsibility 承担责任；accept sb.'s advice 接受某人的建议", "derivative": "acceptance n. 接受；acceptable adj. 可接受的", "synonym": "accept 指主动接受；receive 指收到（不一定接受）；refuse 拒绝", "examPoint": "accept an invitation 接受邀请；区分 accept 和 receive；派生词考点：acceptance n. 接受；acceptable adj. 可接受的", "freq": "中考拓展"}, {"word": "adaptation", "phonetic": "/ˌædæpˈteɪʃn/", "meaning": "u.n./c.n. 适应；改编", "newMeaning": "", "example": "The movie is an adaptation of a novel. 这部电影改编自一部小说。\nAdaptation to new environment takes time. 适应新环境需要时间。", "collocation": "adaptation to 对……的适应；film adaptation 电影改编", "derivative": "adapt v. 适应；改编；adaptable adj. 可适应的；adapter n. 适配器", "synonym": "adaptation 指适应或改编；adjustment 指调整；modification 指修改", "examPoint": "adaptation to 对……的适应；派生词考点：adapt v. 适应；adaptable adj. 可适应的", "freq": "中考一般"}, {"word": "Beijing opera", "phonetic": "/beɪˈdʒɪŋ ˈɒprə/", "meaning": "u.n. 京剧", "newMeaning": "", "example": "Beijing opera is a traditional Chinese art form. 京剧是中国传统艺术形式。\nMany foreigners enjoy watching Beijing opera. 许多外国人喜欢看京剧。", "collocation": "watch Beijing opera 看京剧；perform Beijing opera 演京剧", "derivative": "opera n. 歌剧；traditional adj. 传统的", "synonym": "Beijing opera 京剧；Western opera 西方歌剧", "examPoint": "专有名词，首字母大写", "freq": "中考一般"}, {"word": "host family", "phonetic": "/həʊst ˈfæmli/", "meaning": "c.n. 寄宿家庭", "newMeaning": "", "example": "I stayed with a host family during my study abroad. 我在国外学习期间住在寄宿家庭。\nThe host family treated me kindly. 寄宿家庭对我很好。", "collocation": "stay with a host family 住在寄宿家庭", "derivative": "host n. 主人；hostess n. 女主人", "synonym": "host family 寄宿家庭；homestay 家庭寄宿", "examPoint": "host family 寄宿家庭（交换生/留学生居住的家庭）", "freq": "中考拓展"}, {"word": "snake its way", "phonetic": "/sneɪk ɪts weɪ/", "meaning": "v.i. 蜿蜒前行", "newMeaning": "", "example": "The river snakes its way through the valley. 河流蜿蜒穿过山谷。\nThe road snakes its way up the mountain. 公路蜿蜒上山。", "collocation": "", "derivative": "snake v. 蜿蜒前行 n. 蛇", "synonym": "", "examPoint": "snake 作动词，表示蜿蜒前行", "freq": "中考拓展"}, {"word": "culture shock", "phonetic": "/ˈkʌltʃə ʃɒk/", "meaning": "u.n. 文化冲击", "newMeaning": "", "example": "Many students experience culture shock when studying abroad. 许多学生出国留学时会经历文化冲击。\nIt took time to overcome culture shock. 克服文化冲击需要时间。", "collocation": "experience culture shock 经历文化冲击；overcome culture shock 克服文化冲击", "derivative": "culture n. 文化；shock n. 冲击；震惊", "synonym": "", "examPoint": "culture shock 文化冲击", "freq": "中考拓展"}, {"word": "deal with", "phonetic": "/diːl wɪð/", "meaning": "v.t. 处理；应对", "newMeaning": "", "example": "How do you deal with stress? 你如何应对压力？\nWe need to deal with this problem immediately. 我们需要立即处理这个问题。", "collocation": "deal with problems 处理问题；deal with stress 应对压力；deal with people 与人打交道", "derivative": "", "synonym": "deal with = handle = cope with", "examPoint": "deal with 处理；应对", "freq": "中考核心"}, {"word": "feel at home", "phonetic": "/fiːl æt həʊm/", "meaning": "v.i. 感觉自在", "newMeaning": "", "example": "I felt at home in the new school. 我在新学校感觉很自在。\nThe friendly atmosphere made me feel at home. 友好的氛围让我感觉像在家一样。", "collocation": "make sb. feel at home 让某人感觉自在", "derivative": "", "synonym": "feel at home = feel comfortable = feel relaxed", "examPoint": "feel at home 感觉自在", "freq": "中考拓展"}, {"word": "author", "phonetic": "/ˈɔːθə(r)/", "meaning": "c.n. 作者；作家", "newMeaning  良好的团队合作很重要。", "collocation": "teamwork spirit 团队精神 ; encourage teamwork 鼓励合作", "derivative": "team n. 团队 | work n. 工作", "synonym": "cooperation n. 合作 | collaboration n. 协作", "examPoint": "teamwork spirit团队精神", "freq": "高考一般"}, {"word": "podium", "phonetic": "/ˈpəʊdiəm/", "meaning": "c.n. 领奖台；讲台", "newMeaning": "", "example": "She stood on the podium. 她站在领奖台上。", "collocation": "on the podium 在领奖台上 ; podium finish 登上领奖台", "derivative": "", "synonym": "platform n. 平台", "examPoint": "on the podium在领奖台上", "freq": "高考一般"}, {"word": "tournament", "phonetic": "/ˈtʊənəmənt/", "meaning": "c.n. 锦标赛；比赛", "newMeaning": "", "example": "They won the tournament. 他们赢得了锦标赛。", "collocation": "chess tournament 国际象棋锦标赛 ; tennis tournament 网球锦标赛", "derivative": "", "synonym": "championship n. 锦标赛 | competition n. 比赛", "examPoint": "win the tournament赢得锦标赛", "freq": "高考一般"}, {"word": "intense", "phonetic": "/ɪnˈtens/", "meaning": "adj. 强烈的；紧张的；激烈的", "newMeaning": "", "example": "The competition was intense. 竞争很激烈。", "collocation": "intense competition 激烈竞争 ; intense heat 酷热", "derivative": "intensity n. 强度 | intensely adv. 强烈地", "synonym": "strong adj. 强烈的 | fierce adj. 激烈的", "examPoint": "intense competition激烈竞争", "freq": "高考核心"}], "count": 159}};
        const unitNames = {"初二": "初二词汇", "初三": "初三词汇", "高一": "高一词汇", "高二必修": "高二必修词汇", "高二选修": "高二选修词汇"};

        const urlParams = new URLSearchParams(window.location.search);
        const currentUnit = urlParams.get('unit') || Object.keys(allUnitsData)[0];

        const wordsData = allUnitsData[currentUnit].words;
        const unitDisplayName = unitNames[currentUnit] || currentUnit;

        let learnedWords = JSON.parse(localStorage.getItem('learned_' + currentUnit) || '[]');
        let currentIndex = 0;

        document.getElementById('unitTitle').textContent = unitDisplayName;
        document.title = unitDisplayName + ' - 单词学习';

        function getRandomIndex() {
            const unlearned = wordsData.filter((w, i) => !learnedWords.includes(i));
            if (unlearned.length > 0) {
                const randomUnlearned = unlearned[Math.floor(Math.random() * unlearned.length)];
                return wordsData.indexOf(randomUnlearned);
            }
            return Math.floor(Math.random() * wordsData.length);
        }

        function displayWord(index) {
            const word = wordsData[index];
            currentIndex = index;

            document.getElementById('currentWord').textContent = word.word;
            document.getElementById('currentPhonetic').textContent = word.phonetic;
            document.getElementById('currentMeaning').textContent = word.meaning;

            const freqEl = document.getElementById('currentFreq');
            freqEl.textContent = word.freq || '一般词汇';
            freqEl.className = 'freq-badge';
            if (word.freq && word.freq.includes('核心')) freqEl.classList.add('freq-core');
            else if (word.freq && word.freq.includes('一般')) freqEl.classList.add('freq-general');
            else freqEl.classList.add('freq-expand');

            // 例句
            const exampleSection = document.getElementById('exampleSection');
            const exampleContent = document.getElementById('currentExample');
            if (word.example) {
                exampleSection.style.display = 'block';
                exampleContent.textContent = word.example;
            } else {
                exampleSection.style.display = 'none';
            }

            // 固定搭配
            const collSection = document.getElementById('collocationSection');
            const collContent = document.getElementById('currentCollocation');
            if (word.collocation) {
                collSection.style.display = 'block';
                const items = word.collocation.split(';').filter(i => i.trim());
                collContent.innerHTML = items.map(i => '<span class="collocation-item">' + i.trim() + '</span>').join('');
            } else {
                collSection.style.display = 'none';
            }

            // 派生词
            const derivSection = document.getElementById('derivativeSection');
            const derivContent = document.getElementById('currentDerivative');
            if (word.derivative) {
                derivSection.style.display = 'block';
                derivContent.textContent = word.derivative;
            } else {
                derivSection.style.display = 'none';
            }

            // 同义词
            const synSection = document.getElementById('synonymSection');
            const synContent = document.getElementById('currentSynonym');
            if (word.synonym) {
                synSection.style.display = 'block';
                const items = word.synonym.split('|').filter(i => i.trim());
                synContent.innerHTML = items.map(i => '<span class="synonym-item">' + i.trim() + '</span>').join('');
            } else {
                synSection.style.display = 'none';
            }

            // 考点
            const examSection = document.getElementById('examSection');
            const examContent = document.getElementById('currentExam');
            if (word.examPoint) {
                examSection.style.display = 'block';
                examContent.textContent = word.examPoint;
            } else {
                examSection.style.display = 'none';
            }

            updateLearnButton();
        }

        function updateLearnButton() {
            const btn = document.getElementById('learnBtn');
            if (learnedWords.includes(currentIndex)) {
                btn.textContent = '✓ 已学习';
                btn.classList.add('btn-learned');
            } else {
                btn.textContent = '标记已学习';
                btn.classList.remove('btn-learned');
            }
        }

        function updateProgress() {
            document.getElementById('learnedCount').textContent = learnedWords.length;
            document.getElementById('totalCount').textContent = wordsData.length;
            const percent = (learnedWords.length / wordsData.length * 100).toFixed(1);
            document.getElementById('progressFill').style.width = percent + '%';
        }

        function renderWordList(filter = 'all', search = '') {
            const grid = document.getElementById('wordGrid');
            grid.innerHTML = '';

            wordsData.forEach((word, index) => {
                const isLearned = learnedWords.includes(index);
                if (filter === 'learned' && !isLearned) return;
                if (filter === 'unlearned' && isLearned) return;
                if (search && !word.word.toLowerCase().includes(search.toLowerCase())) return;

                const item = document.createElement('div');
                item.className = 'word-item';
                if (isLearned) item.classList.add('learned');
                item.textContent = word.word;
                item.onclick = () => displayWord(index);
                grid.appendChild(item);
            });
        }

        function init() {
            updateProgress();
            displayWord(getRandomIndex());
            renderWordList();

            document.getElementById('learnBtn').addEventListener('click', function() {
                if (learnedWords.includes(currentIndex)) {
                    learnedWords = learnedWords.filter(i => i !== currentIndex);
                } else {
                    learnedWords.push(currentIndex);
                }
                localStorage.setItem('learned_' + currentUnit, JSON.stringify(learnedWords));
                updateLearnButton();
                updateProgress();
                renderWordList(document.querySelector('.filter-btn.active').dataset.filter, document.getElementById('searchInput').value);
            });

            document.getElementById('nextBtn').addEventListener('click', function() {
                displayWord(getRandomIndex());
            });

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    renderWordList(this.dataset.filter, document.getElementById('searchInput').value);
                });
            });

            document.getElementById('searchInput').addEventListener('input', function() {
                renderWordList(document.querySelector('.filter-btn.active').dataset.filter, this.value);
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
